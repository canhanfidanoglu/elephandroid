services:
  # ── Local Dev ─────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - db-data:/app/data
      - ./src/frontend/templates:/app/src/frontend/templates
    depends_on:
      ollama:
        condition: service_started
        required: false

  ollama:
    image: ollama/ollama:latest
    profiles: [ai]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  # ── Production ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    profiles: [production]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: elephandroid
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elephandroid}
      POSTGRES_DB: elephandroid
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elephandroid"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-prod:
    build: .
    profiles: [production]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://elephandroid:${POSTGRES_PASSWORD:-elephandroid}@postgres:5432/elephandroid
      - LOG_JSON=true
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend ──────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://app:8000
    depends_on:
      - app

volumes:
  db-data:
  ollama-data:
  pg-data:
